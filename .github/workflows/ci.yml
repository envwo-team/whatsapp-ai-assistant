name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        name: Lint, Format & Type Check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Format check
              run: npx biome format src/ --check

            - name: Lint check
              run: npx biome check src/

            - name: Type check
              run: npm run compile

    build:
        name: Build & Package
        runs-on: ubuntu-latest
        needs: check

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build extension
              run: npm run build

            - name: Create zip
              run: npm run zip

            - name: Upload extension zip
              uses: actions/upload-artifact@v4
              with:
                  name: whatsapp-ai-assistant-${{ github.sha }}
                  path: .output/*.zip
                  retention-days: 30
