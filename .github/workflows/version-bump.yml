name: Auto Version Bump

on:
    push:
        branches: [main]
        paths-ignore:
            - "CHANGELOG.md"
            - ".github/**"

permissions:
    contents: write

jobs:
    bump:
        name: Bump Version & Tag
        runs-on: ubuntu-latest
        # Skip if commit is from bot (avoid infinite loops)
        if: "!contains(github.event.head_commit.message, '[skip-ci]') && !contains(github.event.head_commit.author.name, 'github-actions')"

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Determine version bump
              id: bump
              run: |
                  # Get commits since last tag
                  LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

                  if [ -z "$LAST_TAG" ]; then
                    COMMITS=$(git log --oneline)
                  else
                    COMMITS=$(git log "$LAST_TAG"..HEAD --oneline)
                  fi

                  # Determine bump type from conventional commits
                  if echo "$COMMITS" | grep -qE "^[a-f0-9]+ feat!:|^[a-f0-9]+ fix!:|^[a-f0-9]+ refactor!:|BREAKING CHANGE"; then
                    echo "type=major" >> "$GITHUB_OUTPUT"
                  elif echo "$COMMITS" | grep -qE "^[a-f0-9]+ feat"; then
                    echo "type=minor" >> "$GITHUB_OUTPUT"
                  elif echo "$COMMITS" | grep -qE "^[a-f0-9]+ fix|^[a-f0-9]+ perf"; then
                    echo "type=patch" >> "$GITHUB_OUTPUT"
                  else
                    echo "type=none" >> "$GITHUB_OUTPUT"
                  fi

            - name: Bump version in package.json
              if: steps.bump.outputs.type != 'none'
              id: version
              run: |
                  NEW_VERSION=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version)
                  echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
                  echo "Bumped to $NEW_VERSION (${{ steps.bump.outputs.type }})"

            - name: Commit & Tag
              if: steps.bump.outputs.type != 'none'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add package.json
                  git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip-ci]"
                  git tag ${{ steps.version.outputs.version }}
                  git push origin main --tags
