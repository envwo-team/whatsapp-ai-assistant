[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""
footer = """
---
Generated by [git-cliff](https://git-cliff.org/)
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->🚀 Features" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^docs", group = "<!-- 2 -->📚 Documentation" },
    { message = "^perf", group = "<!-- 3 -->⚡ Performance" },
    { message = "^refactor", group = "<!-- 4 -->🔨 Refactor" },
    { message = "^style", group = "<!-- 5 -->🎨 Style" },
    { message = "^test", group = "<!-- 6 -->🧪 Testing" },
    { message = "^ci", group = "<!-- 7 -->⚙️ CI/CD" },
    { message = "^chore|^deps", group = "<!-- 8 -->🧹 Miscellaneous" },
    { message = "^revert", group = "<!-- 9 -->◀️ Reverts" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
